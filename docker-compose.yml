version: '3.8'

services:
  broker:
    build: ./broker
    container_name: bbq_broker
    ports:
      - "1883:1883"
    environment:
      - MQTT_USER=bbq_admin
      - MQTT_PASS=bbq_secret
    restart: unless-stopped
    networks:
      - bbq_net

  backend:
    build: ./backend
    container_name: bbq_backend
    environment:
      - MQTT_BROKER_URL=mqtt://broker:1883
      - MQTT_USER=bbq_admin
      - MQTT_PASS=bbq_secret
      - MQTT_HOST=broker
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN}
      - TWILIO_FROM_PHONE=${TWILIO_FROM_PHONE}
      - TWILIO_TO_PHONE=${TWILIO_TO_PHONE}
    volumes:
      - bbq_db_data:/app/data
    depends_on:
      - broker
    restart: unless-stopped
    networks:
      - bbq_net

  frontend:
    build: ./frontend
    container_name: bbq_frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - bbq_net

networks:
  bbq_net:
    driver: bridge

volumes:
  bbq_db_data:
